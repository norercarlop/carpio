<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ASISTENCIA DE ESCUELA LA CARPIO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { 
            --primary: #1a5c8a; --accent: #27ae60; --danger: #c0392b; 
            --dark: #2c3e50; --info: #0d6efd; --warning: #f39c12; 
            --cr-blue: #002b7f; --cr-red: #ce1126;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            background-color: #f8f9fa;
        }

        .navbar { background: var(--dark); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--cr-red); }
        #scan-view, #parent-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        
        .scanner-card { background: #ffffff; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; border-top: 8px solid var(--cr-blue); }
        .input-scan { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #e0e0e0; border-radius: 12px; text-align: center; outline: none; margin-top: 15px; box-sizing: border-box; }

        #master-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white !important; display: inline-flex; align-items: center; gap: 8px; font-size: 0.85rem; transition: 0.2s; }
        .btn-m { background-color: var(--primary) !important; } 
        .btn-s { background-color: var(--accent) !important; } 
        .btn-d { background-color: var(--danger) !important; } 
        .btn-i { background-color: var(--info) !important; } 
        .btn-w { background-color: var(--warning) !important; }
        .btn-dark { background-color: var(--dark) !important; }

        .power-bar { background: #f1f4f8; padding: 15px; border-radius: 15px; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; border: 1px solid #ddd; flex-wrap: wrap; justify-content: space-between;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #e9ecef; padding: 15px; text-align: left; font-size: 0.85rem; color: var(--dark); border-bottom: 2px solid #dee2e6; }
        td { border-bottom: 1px solid #eee; padding: 12px 15px; }

        .tab-btn { padding: 12px 28px; cursor: pointer; border: none; background: #e9ecef; border-radius: 8px; font-weight: bold; margin-right: 10px; }
        .tab-btn.active { background: var(--cr-blue); color: white; }

        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 15px; display: none; border: 2px solid var(--cr-blue); }
    </style>
</head>
<body>

    <div class="navbar no-print">
        <div><strong>ASISTENCIA DE ESCUELA LA CARPIO</strong></div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-w" onclick="mostrarVista('parent-view')">👨‍👩‍👧 PADRES</button>
            <button class="btn btn-i" onclick="pedirClaveEscaner()">📷 ESCÁNER</button>
            <button class="btn btn-m" onclick="pedirClaveMaster()">🔓 PANEL MASTER</button>
        </div>
    </div>

    <div id="scan-view" style="display:none;">
        <div class="scanner-card">
            <h2 style="color:var(--cr-blue);">Registro de Entrada/Salida</h2>
            <input type="text" id="lector" class="input-scan" placeholder="Escanee carné..." autofocus>
            
            <div id="reader"></div>
            <button id="btnCamara" class="btn btn-i" style="width:100%; margin-top:15px;" onclick="toggleCamara()">📱 ACTIVAR CÁMARA QR</button>

            <div id="resBox" style="margin-top:20px; display:none; padding:20px; border-radius:15px; border: 2px solid #ddd;">
                <h2 id="resNombre"></h2>
                <h3 id="resMov"></h3>
            </div>
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button class="btn btn-dark" style="flex:1" onclick="cambiarPasswordEscaner()">🔑 CLAVE</button>
                <button class="btn btn-d" style="flex:1" onclick="cerrarVistaProtegida('scan-view')">CERRAR</button>
            </div>
        </div>
    </div>

    <div id="parent-view">
        <div class="scanner-card" style="border-top-color: var(--accent);">
            <h2 style="color: var(--accent);">Consulta para Padres</h2>
            <input type="text" id="parentInput" class="input-scan" placeholder="Código de miembro de la escuela">
            <button class="btn btn-s" style="width:100%; margin-top:20px; padding:15px;" onclick="consultarPadre()">BUSCAR INFORMACIÓN</button>
            <div id="parentResult" style="margin-top:20px; display:none; text-align:left;">
                <div style="background:#f9f9f9; padding:15px; border-radius:12px; border:1px solid #eee; margin-bottom:15px;">
                    <h3 id="parentStudentName" style="margin:0; color:var(--primary);"></h3>
                    <p id="parentStudentPuesto" style="margin:5px 0; font-weight:bold; color:var(--cr-red);"></p>
                    <button id="btnConsultaWA" class="btn btn-w" style="width:100%; margin-top:10px;">💬 ENVIAR CONSULTA</button>
                </div>
                <div id="parentLogList" style="border: 1px solid #eee; border-radius:10px; max-height:200px; overflow-y:auto; background:white;"></div>
            </div>
        </div>
    </div>

    <div id="master-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="color:var(--primary); margin:0;">Gestión Administrativa</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-s" onclick="editarNumeroJunta()">📱 TEL. OFICIAL</button>
                <button class="btn btn-w" onclick="cambiarPasswordMaster()">🔑 CLAVE MASTER</button>
                <button class="btn btn-d" onclick="cerrarMaster()">❌ SALIR</button>
            </div>
        </div>

        <div class="tabs-container">
            <button id="tab1" class="tab-btn active" onclick="cambiarTab(1)">👥 MIEMBROS</button>
            <button id="tab2" class="tab-btn" onclick="cambiarTab(2)">📊 REPORTE HISTÓRICO</button>
        </div>

        <div id="sec-alumnos">
            <div class="power-bar no-print">
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-i" onclick="agregarMiembroManual()">➕ AGREGAR</button>
                    <button class="btn btn-m" onclick="sincronizarConNube()">💾 GUARDAR</button>
                    <button class="btn btn-s" onclick="imprimirTodosLosCarnets()">📇 CARNÉS GRUPAL</button>
                </div>
                <button class="btn btn-d" onclick="borrarTodo()">🧨 BORRAR TODO</button>
            </div>
            <input type="text" id="busqueda" placeholder="🔍 Buscar..." onkeyup="filtrarRapido()" style="width:100%; padding:15px; margin-bottom:15px; border-radius:10px; border:2px solid var(--primary);">
            <table>
                <thead>
                    <tr><th>Estado</th><th>Código</th><th>Nombre</th><th>Sección</th><th>WhatsApp</th><th class="no-print">Acciones</th></tr>
                </thead>
                <tbody id="tablaAlumnos"></tbody>
            </table>
        </div>

        <div id="sec-reporte" style="display:none;">
            <div class="power-bar no-print">
                <input type="date" id="reportDate" style="padding:10px; border-radius:8px;">
                <button class="btn btn-s" onclick="filtrarVistaReporte('ENTRADA')">✅ LLEGÓ</button>
                <button class="btn btn-d" onclick="filtrarVistaReporte('AUSENTES')">❌ AUSENTE</button>
                <button class="btn btn-w" onclick="exportarPDFReporte()">📕 PDF</button>
            </div>
            <table id="tabla-logs-final">
                <thead id="headReporte"></thead>
                <tbody id="cuerpoReporte"></tbody>
            </table>
        </div>
    </div>

    <script>
        let NUMERO_OFICIAL_JUNTA = "88888888"; 
        const firebaseConfig = { databaseURL: "https://escuela-la-carpio-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let db = { personas: {} };
        let logsGlobal = [];
        let html5QrCode; 
        let passMaster = localStorage.getItem('PASS_MASTER') || "CARPIO2026";
        let passEscaner = localStorage.getItem('PASS_SCAN') || "1234";

        database.ref('config/numeroOficial').on('value', (s) => { if(s.val()) NUMERO_OFICIAL_JUNTA = s.val(); });
        database.ref('personas').on('value', (s) => { db.personas = s.val() || {}; renderAlumnos(); });
        database.ref('logs').on('value', (s) => { 
            logsGlobal = []; s.forEach(c => { let v = c.val(); v.key = c.key; logsGlobal.push(v); });
            renderAlumnos(); 
        });

        // --- LÓGICA DE ESCANEO ---
        function procesarEscaneo(id) {
            id = id.trim();
            if(!db.personas[id]) return alert("Código no registrado: " + id);
            const hISO = new Date().toISOString().split('T')[0];
            const marcas = logsGlobal.filter(l => (l.fechaISO === hISO) && l.id === id);
            let tipo = marcas.some(l => l.tipo === 'ENTRADA') ? (marcas.some(l => l.tipo === 'SALIDA') ? null : "SALIDA") : "ENTRADA";
            
            if(!tipo) return alert("Ya registró entrada y salida hoy.");
            
            database.ref('logs').push({ id: id, nombre: db.personas[id].nombre, hora: new Date().toLocaleString(), fechaISO: hISO, tipo: tipo });
            const res = document.getElementById('resBox'); res.style.display = 'block'; res.style.background = tipo === "ENTRADA" ? "#d4edda" : "#f8d7da";
            document.getElementById('resNombre').innerText = db.personas[id].nombre; document.getElementById('resMov').innerText = "✅ " + tipo;
            setTimeout(() => res.style.display = 'none', 3000);
        }

        document.getElementById('lector').addEventListener('keydown', (e) => {
            if(e.key === 'Enter') { procesarEscaneo(e.target.value); e.target.value = ''; }
        });

        function toggleCamara() {
            const readerDiv = document.getElementById('reader');
            if (readerDiv.style.display === 'none') {
                readerDiv.style.display = 'block';
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
                    (text) => { procesarEscaneo(text); pararCamara(); }
                ).catch(err => alert("Error: " + err));
                document.getElementById('btnCamara').innerText = "❌ CERRAR CÁMARA";
            } else { pararCamara(); }
        }

        function pararCamara() {
            if(html5QrCode) html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('btnCamara').innerText = "📱 ACTIVAR CÁMARA QR";
            });
        }

        // --- DISEÑO DE CARNÉ (ESTILO IMAGEN ADJUNTA) ---
        function descargarCarnet(id) {
            const p = db.personas[id];
            const win = window.open('','','width=400,height=600');
            win.document.write(`
            <html><head><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
            <style>
                body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #eee; }
                .card { 
                    width: 320px; height: 480px; background: white; border-radius: 20px; overflow: hidden; 
                    box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; font-family: 'Arial', sans-serif;
                    background-image: 
                        linear-gradient(to bottom, #002b7f 15%, transparent 15%, transparent 25%, #ce1126 25%, #ce1126 35%, transparent 35%, transparent 65%, #ce1126 65%, #ce1126 75%, transparent 75%, transparent 85%, #002b7f 85%);
                }
                .escudo { width: 100px; margin-top: 15px; }
                .blue-bar { background: #002b7f; color: white; padding: 10px; margin-top: 110px; font-size: 1.5rem; font-weight: bold; text-transform: uppercase; border-top: 3px solid white; border-bottom: 3px solid white; }
                .id-text { color: #f1c40f; font-weight: bold; font-size: 1.2rem; margin-top: 5px; }
                .qr-zone { background: white; padding: 10px; display: inline-block; margin-top: 15px; border-radius: 5px; }
                .header-text { position: absolute; top: 10px; width: 100%; color: white; font-size: 0.6rem; font-weight: bold; line-height: 1.2; }
            </style>
            </head><body>
            <div class="card" id="print-area">
                <div class="header-text">ESCUELA DE<br>ATENCION PRIORITARIA<br>LA CARPIO</div>
                <center>
                    <img class="escudo" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzN-w0X7y9M3v55_p9Y0S9f96-N5696Y3v5Q&s">
                    <div class="blue-bar">${p.nombre}</div>
                    <div class="id-text">${id}</div>
                    <div class="qr-zone"><div id="q"></div></div>
                </center>
            </div>
            <script>
                new QRCode(document.getElementById("q"), { text: "${id}", width: 130, height: 130 });
                setTimeout(() => { window.print(); window.close(); }, 800);
            <\/script></body></html>`);
            win.document.close();
        }

        // --- FUNCIONES RESTANTES (Mantenidas) ---
        function consultarPadre() {
            const id = document.getElementById('parentInput').value.trim();
            if(!db.personas[id]) return alert("No existe.");
            const p = db.personas[id];
            document.getElementById('parentStudentName').innerText = p.nombre;
            document.getElementById('parentStudentPuesto').innerText = "Sección: " + (p.puesto || "-");
            document.getElementById('btnConsultaWA').onclick = () => {
                window.open(`https://wa.me/506${NUMERO_OFICIAL_JUNTA}?text=Consulta: ${p.nombre} (${id})`, '_blank');
            };
            database.ref('logs').orderByChild('id').equalTo(id).once('value', s => {
                let h = ""; s.forEach(c => { let l=c.val(); h = `<div style="padding:8px;border-bottom:1px solid #eee;">${l.hora} - <b>${l.tipo}</b></div>` + h; });
                document.getElementById('parentLogList').innerHTML = h || "Sin registros.";
                document.getElementById('parentResult').style.display = 'block';
            });
        }

        function renderAlumnos() {
            const t = document.getElementById('tablaAlumnos'); t.innerHTML = "";
            const hISO = new Date().toISOString().split('T')[0];
            const pres = [...new Set(logsGlobal.filter(l => l.fechaISO === hISO && l.tipo === 'ENTRADA').map(l => l.id))];
            Object.entries(db.personas).forEach(([id, p]) => {
                const isP = pres.includes(id);
                t.insertAdjacentHTML('beforeend', `<tr><td>${isP?'✅':'❌'}</td><td><b>${id}</b></td><td>${p.nombre}</td><td>${p.puesto||''}</td><td>${p.telefono||''}</td><td class="no-print"><button class="btn btn-i" onclick="descargarCarnet('${id}')">📇</button> <button class="btn btn-d" onclick="database.ref('personas/${id}').remove()">🗑️</button></td></tr>`);
            });
        }

        function mostrarVista(id) { document.getElementById('scan-view').style.display = (id==='scan-view')?'flex':'none'; document.getElementById('parent-view').style.display = (id==='parent-view')?'flex':'none'; if(id!=='scan-view') pararCamara(); }
        function pedirClaveEscaner() { if(prompt("Clave:") === passEscaner) mostrarVista('scan-view'); }
        function pedirClaveMaster() { if(prompt("Clave:") === passMaster) document.getElementById('master-panel').style.display = 'block'; }
        function cerrarMaster() { document.getElementById('master-panel').style.display = 'none'; }
        function cerrarVistaProtegida(id) { document.getElementById(id).style.display = 'none'; mostrarVista('parent-view'); }
        function filtrarRapido() { let f = document.getElementById('busqueda').value.toUpperCase(); let rows = document.getElementById("tablaAlumnos").getElementsByTagName("tr"); for (let i = 0; i < rows.length; i++) { rows[i].style.display = (rows[i].textContent.toUpperCase().indexOf(f) > -1) ? "" : "none"; } }
        function editarNumeroJunta() { let n = prompt("WhatsApp Junta:", NUMERO_OFICIAL_JUNTA); if(n) database.ref('config/numeroOficial').set(n); }
        function agregarMiembroManual() { const id=prompt("Cédula:"); if(id) { db.personas[id]={nombre:prompt("Nombre:"), puesto:prompt("Sección:"), telefono:prompt("WA:")}; database.ref('personas/'+id).set(db.personas[id]); } }
        function sincronizarConNube() { database.ref('personas').set(db.personas); alert("Guardado."); }
        function cambiarTab(n) { document.getElementById('sec-alumnos').style.display=(n===1)?'block':'none'; document.getElementById('sec-reporte').style.display=(n===2)?'block':'none'; }
        function borrarTodo() { if(confirm("¿Seguro?")) { database.ref('personas').remove(); database.ref('logs').remove(); } }
    </script>
</body>
</html>
