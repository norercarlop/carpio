<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA CARPIO V42 - CLOUD</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #1a5c8a; --accent: #27ae60; --danger: #c0392b; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .navbar { background: var(--dark); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }
        #scan-view, #parent-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        .scanner-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; border-bottom: 6px solid var(--primary); }
        .input-scan { width: 100%; padding: 12px; font-size: 1.5rem; border: 2px solid #ddd; border-radius: 10px; text-align: center; margin-top: 15px; box-sizing: border-box; }
        #master-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .history-list { text-align: left; max-height: 350px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; margin-top: 10px; }
        .history-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-m { background: var(--primary); } .btn-d { background: var(--danger); }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="navbar">
        <div><strong>ESCUELA LA CARPIO</strong></div>
        <div style="display:flex; gap:10px;">
            <button class="btn" style="background:#8e44ad" onclick="mostrarVista('parent-view')">👨‍👩‍👧 PADRES</button>
            <button class="btn btn-m" onclick="mostrarVista('scan-view')">📷 ESCÁNER</button>
            <button class="btn btn-d" onclick="pedirClave()">🔓 MASTER</button>
        </div>
    </div>

    <div id="parent-view" style="display:none;">
        <div class="scanner-card">
            <h2 style="color:var(--primary)">Consulta de Asistencia</h2>
            <p id="status-nube">☁️ Conectando con la base de datos...</p>
            <input type="text" id="parentInput" class="input-scan" placeholder="Ingrese ID o Cédula">
            <button class="btn btn-m" style="width:100%; margin-top:15px; padding:15px;" onclick="consultarPadre()">BUSCAR EN TIEMPO REAL</button>
            <div id="parentResult" style="margin-top:20px; display:none;">
                <h3 id="parentStudentName" style="margin-bottom:5px; color:var(--primary)"></h3>
                <div id="parentLogList" class="history-list"></div>
            </div>
        </div>
    </div>

    <div id="scan-view">
        <div class="scanner-card">
            <h2>Registro de Entrada/Salida</h2>
            <input type="text" id="lector" class="input-scan" placeholder="Escanee carné..." autofocus>
            <div id="resBox" style="margin-top:20px; display:none; padding:15px; border-radius:10px;">
                <h2 id="resNombre"></h2>
                <h3 id="resMov"></h3>
            </div>
        </div>
    </div>

    <div id="master-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Control Maestro Nube</h1>
            <button class="btn btn-d" onclick="cerrarMaster()">CERRAR</button>
        </div>
        <div class="scanner-card" style="max-width:100%; text-align:left; margin-bottom:20px;">
            <button class="btn btn-m" onclick="agregarMiembro()">➕ AGREGAR MIEMBRO A LA NUBE</button>
            <button class="btn" style="background:var(--accent)" onclick="descargarCSV()">📥 DESCARGAR RESPALDO CSV</button>
        </div>
        <table>
            <thead><tr><th>ID</th><th>Nombre</th><th>Puesto</th><th>WhatsApp</th><th>Acción</th></tr></thead>
            <tbody id="tablaAlumnos"></tbody>
        </table>
    </div>

    <script>
        // CONFIGURACIÓN DE TU BASE DE DATOS
        const firebaseConfig = { databaseURL: "https://escuela-la-carpio-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let miembrosGlobal = {}; // Aquí se guardará la base que bajamos de la nube

        // 1. FUNCIÓN MÁGICA: BAJAR LA BASE APENAS ABRE EL LINK
        function sincronizarBaseAlAbrir() {
            database.ref('personas').on('value', (snapshot) => {
                miembrosGlobal = snapshot.val() || {};
                const status = document.getElementById('status-nube');
                if(status) status.innerText = "✅ Base de datos conectada";
                renderTablaMaster();
            });
        }
        sincronizarBaseAlAbrir();

        function mostrarVista(id) {
            document.getElementById('scan-view').style.display = 'none';
            document.getElementById('parent-view').style.display = 'none';
            document.getElementById(id).style.display = 'flex';
        }

        // --- LÓGICA DE PADRES ---
        function consultarPadre() {
            const id = document.getElementById('parentInput').value.trim();
            const list = document.getElementById('parentLogList');
            const p = miembrosGlobal[id];

            if(!p) {
                alert("La identificación no se encuentra en la base de datos de la escuela.");
                return;
            }

            document.getElementById('parentStudentName').innerText = "Estudiante: " + p.nombre;
            database.ref('logs').orderByChild('id').equalTo(id).once('value', (snapshot) => {
                list.innerHTML = "";
                if(snapshot.exists()) {
                    let logs = [];
                    snapshot.forEach(c => { logs.unshift(c.val()); });
                    logs.forEach(l => {
                        list.innerHTML += `<div class="history-item"><span>${l.hora}</span><b>${l.tipo}</b></div>`;
                    });
                } else {
                    list.innerHTML = "<div class='history-item'>No hay registros de asistencia aún.</div>";
                }
                document.getElementById('parentResult').style.display = 'block';
            });
        }

        // --- LÓGICA DE ESCÁNER ---
        document.getElementById('lector').addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                const id = e.target.value.trim();
                const p = miembrosGlobal[id];
                if(p) {
                    const ahora = new Date().toLocaleString();
                    database.ref('logs').push({ id: id, nombre: p.nombre, hora: ahora, tipo: "REGISTRO" });
                    
                    const res = document.getElementById('resBox');
                    res.style.display = 'block'; res.style.background = '#d4edda';
                    document.getElementById('resNombre').innerText = p.nombre;
                    document.getElementById('resMov').innerText = "✅ REGISTRADO";
                    setTimeout(() => { res.style.display = 'none'; }, 2000);
                } else {
                    alert("ID no reconocido.");
                }
                e.target.value = '';
            }
        });

        // --- PANEL MASTER ---
        function pedirClave() { if(prompt("Clave:") === "CARPIO2026") document.getElementById('master-panel').style.display = 'block'; }
        function cerrarMaster() { document.getElementById('master-panel').style.display = 'none'; }

        function renderTablaMaster() {
            const t = document.getElementById('tablaAlumnos'); t.innerHTML = "";
            Object.entries(miembrosGlobal).forEach(([id, p]) => {
                t.innerHTML += `<tr><td>${id}</td><td>${p.nombre}</td><td>${p.puesto}</td><td>${p.telefono}</td>
                <td><button onclick="eliminar('${id}')">🗑️</button></td></tr>`;
            });
        }

        function agregarMiembro() {
            const id = prompt("Cédula:");
            const nom = prompt("Nombre:");
            const tel = prompt("WhatsApp:");
            if(id && nom) database.ref('personas/' + id).set({ nombre: nom, puesto: "Estudiante", telefono: tel });
        }

        function eliminar(id) { if(confirm("¿Eliminar?")) database.ref('personas/' + id).remove(); }
        
        function descargarCSV() {
            let csv = "ID,Nombre,Telefono\n";
            Object.entries(miembrosGlobal).forEach(([id, p]) => csv += `${id},${p.nombre},${p.telefono}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "BASE_CARPIO.csv"; a.click();
        }
    </script>
</body>
</html>
